<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background: linear-gradient(115deg, #4e0101, #000000);
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .container{
      background:white;
      padding:30px;
      width: 450px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    form{
      display:flex;
      flex-direction:column;
    }

    label{
      margin-bottom:5px;
      font-weight:bold;
      color:#444;
    }

    input,
    select,
    button{
      padding:10px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:5px;
      font-size:15px;
    }

    button{
      background:#4e0101;
      color:white;
      border:none;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#030000;
    }

    #resultado{
      display:none;
      margin-top:15px;
      padding:15px;
      background:#000000;
      border-radius:5px;
      line-height:1.8;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Cadastro</h1>

    <form>
      <label for="nome">Nome:</label>
      <input type="text" id="nome" placeholder="Digite seu nome">
 
      <label for="idade">Idade:</label>
      <input type="number" id="idade" placeholder="Digite sua idade">

      <label for="profissao">Profissão:</label>
      <input type="text" id="profissao" placeholder="Digite sua profissao">

      <label for="orgao">Órgão:</label>
      <select id="orgao">
        <option selected disabled>Selecione</option>
        <option>militar</option>
        <option>civil</option>
        <option>municipal</option>
        <option>federal</option>
      </select>

      <button type="button" onclick="mostrarDados()">
        Enviar
      </button>

      <button type="button" onclick="limparCadastro()">
        Limpar

    </form>

    <div id="resultado"></div>

  </div>

  <script>
    function mostrarDados() {

      let nome = document.getElementById("nome").value;
      let idade = document.getElementById("idade").value;
      let profissao = document.getElementById("profissao").value;
      let orgao = document.getElementById("orgao").value;

      document.getElementById("resultado").style.display = "block";

      document.getElementById("resultado").innerHTML =
        "<strong>Nome:</strong> " + nome + "<br>" +
        "<strong>Idade:</strong> " + idade + "<br>" +
        "<strong>Profissão:</strong> " + profissao + "<br>" +
        "<strong>Órgão:</strong> " + orgao;
    }

    

    function limparCadastro() {
      document.getElementById("nome").value = "";
      document.getElementById("idade").value = "";
      document.getElementById("profissao").value = "";
      document.getElementById("orgao").value = "";

      document.getElementById("Limpar").style.display = "block";

    }


  </script>

</body>
</html>
